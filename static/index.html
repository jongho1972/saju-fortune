<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude가 알려주는 사주팔자</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>Claude가 알려주는 사주팔자</h1>
        <p class="subtitle">AI 기반 사주 운세 분석</p>
    </header>

    <div class="container">
        <!-- 입력 폼 -->
        <section id="input-section" class="card">
            <h2>생년월일시 입력</h2>
            <form id="saju-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">이름</label>
                        <input type="text" id="name" placeholder="이름을 입력하세요" required>
                    </div>
                    <div class="form-group">
                        <label>성별</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="gender" value="male" checked>
                                <span>남</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="gender" value="female">
                                <span>여</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>달력</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="calendar_type" value="solar" checked>
                                <span>양력</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="calendar_type" value="lunar">
                                <span>음력</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group" id="intercalation-group" style="display:none;">
                        <label>
                            <input type="checkbox" id="is_intercalation">
                            윤달
                        </label>
                    </div>
                </div>

                <div class="form-row birth-row">
                    <div class="form-group">
                        <label for="year">년</label>
                        <select id="year" required></select>
                    </div>
                    <div class="form-group">
                        <label for="month">월</label>
                        <select id="month" required></select>
                    </div>
                    <div class="form-group">
                        <label for="day">일</label>
                        <select id="day" required></select>
                    </div>
                    <div class="form-group">
                        <label for="hour">시</label>
                        <select id="hour">
                            <option value="">모름</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="minute">분 <span class="hint">(선택)</span></label>
                        <select id="minute">
                            <option value="0">0분</option>
                            <option value="10">10분</option>
                            <option value="20">20분</option>
                            <option value="30">30분</option>
                            <option value="40">40분</option>
                            <option value="50">50분</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="birth_region">출생 지역 <span class="hint">(진태양시 보정)</span></label>
                        <select id="birth_region">
                            <option value="seoul" selected>서울특별시</option>
                            <option value="busan">부산광역시</option>
                            <option value="daegu">대구광역시</option>
                            <option value="incheon">인천광역시</option>
                            <option value="gwangju">광주광역시</option>
                            <option value="daejeon">대전광역시</option>
                            <option value="ulsan">울산광역시</option>
                            <option value="sejong">세종특별자치시</option>
                            <option value="gyeonggi">경기도</option>
                            <option value="gangwon">강원특별자치도</option>
                            <option value="chungbuk">충청북도</option>
                            <option value="chungnam">충청남도</option>
                            <option value="jeonbuk">전북특별자치도</option>
                            <option value="jeonnam">전라남도</option>
                            <option value="gyeongbuk">경상북도</option>
                            <option value="gyeongnam">경상남도</option>
                            <option value="jeju">제주특별자치도</option>
                        </select>
                    </div>
                </div>

                <details class="advanced-settings">
                    <summary>고급 설정</summary>
                    <div class="form-row">
                        <div class="form-group">
                            <label>23시 출생자 처리 <span class="hint">(자시 학파 선택)</span></label>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="time_system" value="joja" checked>
                                    <span>당일 일주 (일반)</span>
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="time_system" value="yaja">
                                    <span>익일 일주</span>
                                </label>
                            </div>
                        </div>
                    </div>
                    <p class="advanced-note">선택한 출생 지역 경도로 진태양시가 자동 보정됩니다. (서울 기준 약 -32분, 부산 기준 약 -24분)</p>
                </details>

                <button type="submit" id="submit-btn">
                    <span class="btn-text">사주 분석하기</span>
                    <span class="btn-loading" style="display:none;">
                        <span class="spinner"></span> 분석 중...
                    </span>
                </button>
            </form>
        </section>

        <!-- 로딩 -->
        <section id="loading-section" class="card" style="display:none;">
            <div class="loading-container">
                <div class="taeguk-spinner">
                    <div class="taeguk-inner"></div>
                </div>
                <p>당신의 운명을 확인하고 있습니다...</p>
            </div>
        </section>

        <!-- 결과 -->
        <section id="result-section" style="display:none;">
            <!-- 사주팔자 표 -->
            <div class="card" id="saju-table-card">
                <h2>사주팔자</h2>
                <div id="saju-info"></div>
                <div id="saju-table"></div>
                <div id="ohaeng-chart"></div>
            </div>

            <!-- AI 해석 -->
            <div class="card" id="interpretation-card">
                <h2>AI 사주 해석</h2>
                <div id="interpretation"></div>
            </div>

            <!-- 추가 질문 -->
            <div class="card" id="followup-card" style="display:none;">
                <h2>추가 질문</h2>
                <div id="followup-chat"></div>
                <div class="followup-input-wrap">
                    <input type="text" id="followup-input" placeholder="사주에 대해 더 궁금한 점을 물어보세요" />
                    <button id="followup-btn" onclick="sendFollowup()">질문</button>
                </div>
            </div>
        </section>

        <footer>
            <p>이 서비스는 재미를 위한 것이며, 정확성을 보장하지 않습니다.</p>
            <p>Built with Claude Code by 이종호 (<a href="mailto:jongho1972@gmail.com">jongho1972@gmail.com</a>)</p>
            <p class="deploy-date" id="deploy-date"></p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.4/marked.min.js"></script>
    <script src="/script.js"></script>
</body>
</html>
